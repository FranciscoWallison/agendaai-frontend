name: build-android-apk

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipo de build (debug/release)'
        type: choice
        default: debug
        options: [debug, release]

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Plugin @chicowall/capacitor-appfunctions vem do npm (publico).

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;35.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Build Angular (production)
        run: npm run build -- --configuration production

      - name: Capacitor sync (Android)
        run: npx cap sync android

      - name: Set BUILD_TYPE
        id: bt
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.build_type }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=debug" >> "$GITHUB_OUTPUT"
          fi

      - name: Gradle build (${{ steps.bt.outputs.value }})
        working-directory: android
        run: |
          chmod +x ./gradlew
          if [ "${{ steps.bt.outputs.value }}" = "release" ]; then
            ./gradlew :app:assembleRelease --no-daemon
          else
            ./gradlew :app:assembleDebug --no-daemon
          fi

      - name: Locate APK
        id: apk
        working-directory: android
        run: |
          if [ "${{ steps.bt.outputs.value }}" = "release" ]; then
            APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          else
            APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          ls -lh "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agendaai-${{ steps.bt.outputs.value }}-${{ github.sha }}
          path: android/${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 14
