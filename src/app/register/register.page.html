<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login"></ion-back-button>
    </ion-buttons>
    <ion-title>Criar conta</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <ion-item>
      <ion-label position="stacked">Nome do responsavel</ion-label>
      <ion-input formControlName="nome" autocomplete="name"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">E-mail</ion-label>
      <ion-input type="email" formControlName="email" autocomplete="email"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">Telefone (opcional)</ion-label>
      <ion-input type="tel" formControlName="telefone" autocomplete="tel"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="stacked">Senha (min 8, com letra e numero)</ion-label>
      <ion-input type="password" formControlName="senha" autocomplete="new-password"></ion-input>
    </ion-item>

    <ion-button
      class="ion-margin-top"
      expand="block"
      type="submit"
      [disabled]="form.invalid || loading"
    >
      <ion-spinner *ngIf="loading" name="dots"></ion-spinner>
      <span *ngIf="!loading">Cadastrar</span>
    </ion-button>
  </form>
</ion-content>
